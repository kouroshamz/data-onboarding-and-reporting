name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-and-e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build reusable test image
        uses: docker/build-push-action@v6
        with:
          context: ./data-onboarding-system
          file: ./data-onboarding-system/docker/Dockerfile.test
          tags: data-onboarding-test:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start test database
        run: |
          cd data-onboarding-system
          docker compose -f docker-compose.test.yml up -d test-postgres

      - name: Wait for healthy DB
        run: |
          cd data-onboarding-system
          cid=$(docker compose -f docker-compose.test.yml ps -q test-postgres)
          for i in {1..30}; do
            status=$(docker inspect --format='{{.State.Health.Status}}' "$cid")
            if [ "$status" = "healthy" ]; then
              echo "Database healthy"
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.test.yml logs test-postgres
          exit 1

      - name: Generate test datasets + run unit & integration tests
        run: |
          cd data-onboarding-system
          docker run --rm \
            --network data-onboarding-system_default \
            -e DB_HOST=test-postgres \
            -e DB_PORT=5432 \
            -e DB_NAME=testdb \
            -e DB_USER=testuser \
            -e DB_PASSWORD=testpass \
            -e PYTHONPATH=/app \
            -v "$PWD:/app" \
            -w /app \
            --entrypoint bash \
            data-onboarding-test:ci \
            -c "pip install --quiet seaborn scikit-learn && \
                python tests/fixtures/datasets/generate_datasets.py && \
                pytest tests/ -v"

      - name: Run E2E smoke pipeline
        run: |
          cd data-onboarding-system
          docker run --rm \
            --network data-onboarding-system_default \
            -e DB_HOST=test-postgres \
            -e DB_PORT=5432 \
            -e DB_NAME=testdb \
            -e DB_USER=testuser \
            -e DB_PASSWORD=testpass \
            -e PYTHONPATH=/app \
            -v "$PWD:/app" \
            -w /app \
            data-onboarding-test:ci \
            python -m app.cli run --config config.test.yaml

      - name: Create E2E summary artifact
        run: |
          cd data-onboarding-system
          mkdir -p ../artifacts
          python - <<'PY'
          import json
          from pathlib import Path

          report = Path("test_reports/test_001/report_data.json")
          data = json.loads(report.read_text(encoding="utf-8"))
          summary = {
              "client": data["client"]["name"],
              "generated_at": data.get("generated_at"),
              "table_count": data["schema"]["table_count"],
              "industry": data["industry"],
              "pii_summary": data["pii"]["summary"],
              "relationship_count": len(data["relationships"]["relationships"]),
              "kpis": [k["name"] for k in data["kpis"]],
          }
          Path("../artifacts/e2e_summary.json").write_text(
              json.dumps(summary, indent=2), encoding="utf-8"
          )
          PY
          cp test_reports/test_001/report.txt ../artifacts/report.txt
          cp test_reports/test_001/report_data.json ../artifacts/report_data.json
          cp test_reports/test_001/report.html ../artifacts/report.html
          cp test_reports/test_001/report.pdf ../artifacts/report.pdf

      - name: Upload E2E artifacts
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-artifacts
          path: artifacts/
          if-no-files-found: error

      - name: Teardown test database
        if: always()
        run: |
          cd data-onboarding-system
          docker compose -f docker-compose.test.yml down -v
