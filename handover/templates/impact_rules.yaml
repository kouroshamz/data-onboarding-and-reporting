spec_version: "1.0.0"
rules:
  - metric: "order_conversion_rate"
    condition: "< 2.0"
    severity: "major"
    risk_statement: "Revenue leakage is likely due to conversion drop-off."
    impact_statement: "Lower conversion suppresses top-line growth and payback efficiency."
    action_statement: "Audit funnel tracking and checkout friction within 7 days."
    owner_role: "growth_analytics"
  - metric: "mrr_churn_rate"
    condition: "> 5.0"
    severity: "critical"
    risk_statement: "Recurring revenue stability is at risk."
    impact_statement: "Churn above threshold can reverse net growth despite new bookings."
    action_statement: "Prioritize retention cohort analysis and cancellation reason tagging."
    owner_role: "revops"
  - metric: "freshness_days"
    condition: "> 3"
    severity: "major"
    risk_statement: "Operational decisions may be based on stale data."
    impact_statement: "Delayed refresh can invalidate daily KPI and pacing decisions."
    action_statement: "Restore ingestion schedule and add freshness alerting."
    owner_role: "data_engineering"
  - metric: "duplicate_rate_percent"
    condition: "> 1.0"
    severity: "major"
    risk_statement: "Duplicate records can inflate KPI values."
    impact_statement: "Trend accuracy and unit economics may be materially distorted."
    action_statement: "Implement deduplication key logic and enforce uniqueness constraints."
    owner_role: "analytics_engineering"
